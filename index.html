<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversário Heitor e Enrico</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        /* Cores e Estilos Baseados nas Fotos */
        :root {
            --primary-blue: #0A58CA; /* Azul do Sonic/Fundo */
            --secondary-purple: #7833FF; /* Roxo do Botão original */
            --action-green: #28a745; /* Verde para sucesso */
            --bg-gray: #F0F2F5;
        }

        body { 
            background-color: var(--primary-blue); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            padding-bottom: 50px;
        }

        /* Container Principal (Branco) */
        .festa-container { 
            max-width: 480px; 
            background: white; 
            margin: 20px auto;
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            overflow: hidden; /* Para o banner respeitar a borda arredondada */
            padding-bottom: 30px;
        }

        /* Banner do Sonic */
        .banner-sonic {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Seção de Detalhes (Data, Local, Mapa) */
        .detalhes-section {
            padding: 20px 25px;
            border-bottom: 1px solid #eee;
        }

        .detalhes-header {
            color: var(--primary-blue);
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .info-row i {
            color: var(--primary-blue);
            font-size: 1.2rem;
            margin-right: 15px;
            margin-top: 2px;
        }

        .mapa-snapshot {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-top: 10px;
        }

        /* Seção do Formulário RSVP */
        .rsvp-section {
            padding: 25px;
        }

        .rsvp-header {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-label { font-weight: 600; color: #555; }
        
        .form-select-lg, .form-control-lg {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            font-size: 1rem;
        }

        .form-select-lg:focus, .form-control-lg:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 0.2rem rgba(10, 88, 202, 0.25);
        }

        /* Lista de Convidados Dinâmica */
        .convidado-input-group {
            position: relative;
            margin-bottom: 10px;
        }

        .convidado-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            z-index: 10;
        }

        .nome-convidado {
            padding-left: 45px; /* Espaço para o ícone */
        }

        /* Botões */
        .btn-add-nome {
            color: var(--primary-blue);
            border: 2px solid var(--primary-blue);
            border-radius: 10px;
            font-weight: 600;
            background: white;
            padding: 8px 20px;
            transition: all 0.2s;
        }

        .btn-add-nome:hover {
            background-color: var(--primary-blue);
            color: white;
        }

        .btn-gravar {
            background-color: var(--action-green);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 15px;
            transition: background 0.2s;
        }

        .btn-gravar:hover {
            background-color: #218838;
        }

        /* Utilitários */
        .hidden { display: none; }
        .festalab-footer {
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="festa-container">
        <img src="https://i.imgur.com/8m4n9wX.png" alt="Banner Sonic Heitor e Enrico" class="banner-sonic">

        <div class="detalhes-section">
            <div class="detalhes-header">Confirme sua presença abaixo</div>
            
            <div class="info-row">
                <i class="bi bi-calendar3"></i>
                <div>
                    <strong>Data:</strong> 02/05/2026 - a partir das 15:00
                </div>
            </div>

            <div class="info-row">
                <i class="bi bi-geo-alt-fill"></i>
                <div>
                    <strong>Local:</strong> Terraço Festa<br>
                    Av. Zumkeller, 154 - Mandaqui, São Paulo - SP
                </div>
            </div>
            
            <img src="https://i.imgur.com/u5jK4bF.png" alt="Mapa Local" class="mapa-snapshot">
        </div>

        <div class="rsvp-section">
            <form id="rsvpForm">
                <div class="mb-4">
                    <label class="form-label">Você poderá ir?</label>
                    <select class="form-select form-select-lg" id="status" onchange="toggleCampos(this.value)">
                        <option value="Sim">Sim, confirmadíssimo! ✅</option>
                        <option value="Não">Não, infelizmente... ❌</option>
                    </select>
                </div>

                <div id="camposConvidados">
                    <label class="form-label">Nomes dos Convidados (pressione "+" para adicionar):</label>
                    <div id="listaInputs">
                        <div class="convidado-input-group">
                            <i class="bi bi-person convidado-icon"></i>
                            <input type="text" class="form-control form-control-lg nome-convidado" placeholder="1. Seu Nome Completo" required>
                        </div>
                    </div>
                    
                    <div class="text-center mt-3 mb-4">
                        <button type="button" class="btn btn-add-nome btn-sm" onclick="addCampo()">
                            <i class="bi bi-plus-lg"></i> Adicionar outro nome
                        </button>
                    </div>
                </div>

                <button type="button" id="btnEnviar" class="btn btn-gravar w-100" onclick="enviarParaGoogle()">
                    Gravar Confirmação 🎉
                </button>
            </form>
            
            <div id="mensagem" class="mt-3 text-center hidden">
                <div class="alert alert-success border-2">
                    <h4>Sucesso! 🎉</h4>
                    <p>Sua resposta foi enviada.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="festalab-footer">Inspirado por Festalab | Heitor & Enrico 6 Anos</div>

    <script>
        // --- CONFIGURAÇÃO ---
        // COLE AQUI a URL do seu Web App do Google (que termina em /exec)
        const urlGoogleApi = "SUA_URL_DO_GOOGLE_APPS_SCRIPT_AQUI";
        // ---------------------

        function addCampo() {
            const div = document.getElementById('listaInputs');
            const count = div.querySelectorAll('.convidado-input-group').length + 1;
            
            // Cria a estrutura do grupo de input com ícone
            const group = document.createElement('div');
            group.className = 'convidado-input-group mt-2';
            
            group.innerHTML = `
                <i class="bi bi-person convidado-icon"></i>
                <input type="text" class="form-control form-control-lg nome-convidado" placeholder="${count}. Nome do Acompanhante">
            `;
            
            div.appendChild(group);
        }

        function toggleCampos(val) {
            document.getElementById('camposConvidados').classList.toggle('hidden', val === 'Não');
        }

        function enviarParaGoogle() {
            const btn = document.getElementById('btnEnviar');
            const status = document.getElementById('status').value;
            const inputs = document.querySelectorAll('.nome-convidado');
            
            // Pega apenas os nomes preenchidos
            const convidados = Array.from(inputs)
                                    .map(i => i.value.trim())
                                    .filter(v => v !== "");

            // Validação básica
            if (status === 'Sim' && convidados.length === 0) {
                alert("Por favor, preencha pelo menos o seu nome.");
                inputs[0].focus();
                return;
            }

            btn.disabled = true;
            btn.innerText = "Enviando...";

            if (urlGoogleApi === "SUA_URL_DO_GOOGLE_APPS_SCRIPT_AQUI") {
                alert("Mestre! Você esqueceu de colar a URL do Google Script no código.");
                btn.disabled = false;
                btn.innerText = "Gravar Confirmação 🎉";
                return;
            }

            // Envia os dados para o cérebro (Google Sheets)
            fetch(urlGoogleApi, {
                method: 'POST',
                mode: 'no-cors', // Necessário para evitar erro de CORS
                body: JSON.stringify({ status: status, convidados: convidados })
            })
            .then(() => {
                // Esconde o form e mostra o sucesso
                document.getElementById('rsvpForm').classList.add('hidden');
                document.getElementById('mensagem').classList.remove('hidden');
            })
            .catch(err => {
                console.error(err);
                alert("Houve um erro ao salvar. Por favor, tente novamente.");
                btn.disabled = false;
                btn.innerText = "Gravar Confirmação 🎉";
            });
        }
    </script>
</body>
</html>
