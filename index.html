<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview: Niver Heitor e Enrico</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { 
            padding: 20px; 
            background-color: #e9ecef; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container { 
            max-width: 450px; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        .hidden { display: none; }
        .btn-success { background-color: #28a745; border: none; }
        .btn-outline-primary { border-radius: 20px; }
        h3 { color: #333; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container mt-5">
        <h3 class="text-center">Convite: Heitor & Enrico 🎂</h3>
        <p class="text-center text-muted">Confirme sua presença abaixo</p>
        <hr>
        
        <form id="rsvpForm">
            <div class="mb-4">
                <label class="form-label fw-bold">Você poderá ir?</label>
                <select class="form-select form-select-lg" id="status" onchange="toggleCampos(this.value)">
                    <option value="Sim">Sim, confirmadíssimo! ✅</option>
                    <option value="Não">Infelizmente não poderei ir ❌</option>
                </select>
            </div>

            <div id="camposConvidados">
                <label class="form-label fw-bold">Nomes dos Convidados:</label>
                <div id="listaInputs">
                    <input type="text" class="form-control mb-3 nome-convidado" placeholder="Seu Nome">
                    <input type="text" class="form-control mb-3 nome-convidado" placeholder="Acompanhante 2">
                </div>
                <button type="button" class="btn btn-outline-primary btn-sm mb-4" onclick="addCampo()">+ Adicionar outro nome</button>
            </div>

            <button type="button" id="btnEnviar" class="btn btn-success btn-lg w-100" onclick="simularGravacao()">Gravar Confirmação</button>
        </form>
        
        <div id="mensagem" class="mt-3 text-center hidden">
            <div class="alert alert-success">
                <h4>Sucesso! 🎉</h4>
                <p>Sua resposta foi enviada para o Denis.</p>
            </div>
        </div>
    </div>

    <script>
        // Função para adicionar campos (igual a que vai pro Google)
        function addCampo() {
            const div = document.getElementById('listaInputs');
            const count = div.querySelectorAll('input').length + 1;
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'form-control mb-3 nome-convidado';
            input.placeholder = 'Acompanhante ' + count;
            div.appendChild(input);
        }

        // Esconde os nomes se ele disser que não vai
        function toggleCampos(val) {
            document.getElementById('camposConvidados').classList.toggle('hidden', val === 'Não');
        }

        // No GitHub ele apenas simula o sucesso
        function simularGravacao() {
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "Processando...";

            setTimeout(() => {
                document.getElementById('rsvpForm').classList.add('hidden');
                document.getElementById('mensagem').classList.remove('hidden');
            }, 1500);
        }
    </script>
</body>
<
/html>
