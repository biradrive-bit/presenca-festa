<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversário Heitor e Enrico</title>

    <meta property="og:title" content="Aniversário Heitor e Enrico">
    <meta property="og:description" content="Confirme sua presença no aniversário dos meninos!">
    <meta property="og:url" content="https://biradrive-bit.github.io/presenca-festa/index2.html">
    <meta property="og:image" content="https://i.postimg.cc/3xc8ZhVw/IMG-20260403-WA0001-2.jpg">
    <meta property="og:image:secure_url" content="https://i.postimg.cc/3xc8ZhVw/IMG-20260403-WA0001-2.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --sonic-blue: #054ADA; 
            --sonic-red: #E71D08;
            --sonic-yellow: #FEE100;
            --action-green: #28a745; 
        }
        
        body { 
            background: linear-gradient(135deg, #021B3D 0%, #054ADA 100%);
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px 0;
        }

        .festa-container { 
            max-width: 450px; 
            background: #ffffff; 
            margin: auto; 
            border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            overflow: hidden;
            border: 4px solid var(--sonic-yellow);
        }

        .banner-sonic { width: 100%; display: block; border-bottom: 5px solid var(--sonic-red); }

        .detalhes-section { padding: 25px; background: #fdfdfd; }
        .detalhes-header { 
            color: var(--sonic-blue); 
            font-weight: 700; 
            font-size: 1.3rem; 
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .info-card {
            background: #f1f4f9;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            border-left: 5px solid var(--sonic-blue);
        }
        .info-card i { font-size: 1.5rem; color: var(--sonic-blue); margin-right: 15px; }
        .info-text strong { display: block; font-size: 0.8rem; color: #666; text-transform: uppercase; }
        .info-text span { font-size: 1rem; font-weight: 600; color: #333; }

        .mapa-link { text-decoration: none; display: block; transition: transform 0.3s; }
        .mapa-link:hover { transform: scale(1.02); }
        .mapa-img { width: 100%; border-radius: 15px; border: 2px solid #ddd; margin-top: 10px; }

        .rsvp-section { padding: 25px; background: white; }
        .form-label { font-weight: 700; color: #444; margin-bottom: 10px; }

        .convidado-card { 
            background: #fff; 
            padding: 15px; 
            border-radius: 20px; 
            margin-bottom: 15px; 
            border: 2px solid #eee;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }

        .btn-add { 
            color: var(--sonic-blue); 
            border: 2px dashed var(--sonic-blue); 
            border-radius: 15px; 
            font-weight: 600; 
            background: #f0f7ff; 
            padding: 12px; 
            width: 100%; 
            transition: all 0.3s;
        }
        .btn-add:hover { background: var(--sonic-blue); color: white; border-style: solid; }

        .btn-gravar { 
            background: linear-gradient(90deg, #28a745 0%, #218838 100%);
            color: white; 
            border: none; 
            border-radius: 20px; 
            font-weight: 700; 
            padding: 18px; 
            font-size: 1.2rem; 
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.3);
            transition: transform 0.2s;
        }
        .btn-gravar:active { transform: scale(0.95); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="festa-container">
        <img src="https://i.postimg.cc/3xc8ZhVw/IMG-20260403-WA0001-2.jpg" class="banner-sonic">

        <div class="detalhes-section">
            <div class="detalhes-header">Informações da Festa</div>
            
            <div class="info-card">
                <i class="bi bi-calendar-event"></i>
                <div class="info-text">
                    <strong>Quando será:</strong>
                    <span>Sábado, 02/05/2026 às 15:00</span>
                </div>
            </div>

            <div class="info-card">
                <i class="bi bi-geo-alt"></i>
                <div class="info-text">
                    <strong>Onde:</strong>
                    <span>Terraço Festa - Av. Zumkeller, 154</span>
                </div>
            </div>
            
            <a href="https://maps.google.com/?q=Av.+Zumkeller,+154" target="_blank" class="mapa-link">
                <img src="https://i.postimg.cc/52MTdRzz/Screenshot-20260403-160612-Firefox.jpg" class="mapa-img">
                <div class="text-center small text-primary mt-2 fw-bold">TOQUE PARA ABRIR O GPS 📍</div>
            </a>
        </div>

        <div class="rsvp-section">
            <form id="rsvpForm">
                <div class="mb-4">
                    <label class="form-label">Você poderá ir?</label>
                    <select class="form-select form-select-lg" id="status" onchange="ajustarFormulario(this.value)" style="border-radius: 15px;">
                        <option value="Sim">Sim, confirmadíssimo! ✅</option>
                        <option value="Não">Não, infelizmente... ❌</option>
                    </select>
                </div>

                <div id="seccaoNomes">
                    <label class="form-label" id="labelNomes">Quem vai com você?</label>
                    <div id="listaInputs">
                        <div class="convidado-card">
                            <div class="mb-2" style="position:relative">
                                <i class="bi bi-person" style="position:absolute; left:12px; top:12px; color:#aaa"></i>
                                <input type="text" class="form-control form-control-lg nome-convidado" placeholder="Nome Completo" required style="padding-left:40px; border-radius:12px; font-size:1rem;">
                            </div>
                            <select class="form-select categoria-idade" style="border-radius:12px;">
                                <option value="Adultos e adolescentes">Adultos e adolescentes</option>
                                <option value="Crianças entre 6 e 11 anos">Crianças entre 6 e 11 anos</option>
                                <option value="Crianças até 5 anos">Crianças até 5 anos</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="button" id="btnMais" class="btn btn-add mb-4" onclick="addCampo()">
                        <i class="bi bi-plus-circle-fill"></i> Adicionar Acompanhante
                    </button>
                </div>

                <button type="button" id="btnEnviar" class="btn btn-gravar w-100" onclick="enviarParaGoogle()">
                    Confirmar Presença 🎉
                </button>
            </form>
            
            <div id="mensagem" class="mt-3 text-center hidden">
                <div class="alert alert-success border-0" style="border-radius:20px; background:#e7f5ea">
                    <i class="bi bi-check-circle-fill" style="font-size:3rem; color:#28a745"></i>
                    <h4 class="mt-2 fw-bold">Sucesso!</h4>
                    <p>Sua resposta foi enviada. Esperamos você lá!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlGoogleApi = "https://script.google.com/macros/s/AKfycbx2v6y7j76UjJJg2xeOT5q5mTHUsnBYPJEmvJkN3AK1ZR2PmVGJe5wIf_86_-ifwVEbvw/exec";

        function addCampo() {
            const div = document.getElementById('listaInputs');
            const card = document.createElement('div');
            card.className = 'convidado-card mt-2';
            card.innerHTML = `
                <div class="mb-2" style="position:relative">
                    <i class="bi bi-person" style="position:absolute; left:12px; top:12px; color:#aaa"></i>
                    <input type="text" class="form-control form-control-lg nome-convidado" placeholder="Nome do Acompanhante" style="padding-left:40px; border-radius:12px; font-size:1rem;">
                </div>
                <select class="form-select categoria-idade" style="border-radius:12px;">
                    <option value="Adultos e adolescentes">Adultos e adolescentes</option>
                    <option value="Crianças entre 6 e 11 anos">Crianças entre 6 e 11 anos</option>
                    <option value="Crianças até 5 anos">Crianças até 5 anos</option>
                </select>`;
            div.appendChild(card);
        }

        function ajustarFormulario(val) {
            const labelNomes = document.getElementById('labelNomes');
            const btnMais = document.getElementById('btnMais');
            const categorias = document.querySelectorAll('.categoria-idade');
            if (val === 'Não') {
                labelNomes.innerText = "Informe seu nome (ou da família):";
                btnMais.classList.add('hidden');
                categorias.forEach(sel => sel.classList.add('hidden'));
            } else {
                labelNomes.innerText = "Quem vai com você?";
                btnMais.classList.remove('hidden');
                categorias.forEach(sel => sel.classList.remove('hidden'));
            }
        }

        function enviarParaGoogle() {
            const btn = document.getElementById('btnEnviar');
            const status = document.getElementById('status').value;
            const nomes = document.querySelectorAll('.nome-convidado');
            const categorias = document.querySelectorAll('.categoria-idade');
            let listaFinal = [];
            nomes.forEach((input, index) => {
                const nomeVal = input.value.trim();
                if(nomeVal !== "") {
                    const infoExtra = status === 'Sim' ? ` [${categorias[index].value}]` : "";
                    listaFinal.push(`${nomeVal}${infoExtra}`);
                }
            });
            if (listaFinal.length === 0) { alert("Por favor, preencha seu nome."); return; }
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Enviando...';
            fetch(urlGoogleApi, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ status: status, convidados: listaFinal })
            })
            .then(() => {
                document.getElementById('rsvpForm').classList.add('hidden');
                document.getElementById('mensagem').classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
